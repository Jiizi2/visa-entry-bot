<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>EntryMate By Ghaniya</title>
    <style>
      :root {
        --graphite: #1a1d1e;
        --gold: #d9a94f;
        --light-gold: #f7d883;
        --dark-gold: #a66c2d;
        --mineral-green: #e7efe8;
        --pearl: #f9f9f9;
        --background: #f1f4f1;
        --surface-soft: var(--mineral-green);
        --surface-card: var(--pearl);
        --ink: var(--graphite);
        --muted: #707874;
        --line: rgba(26, 29, 30, 0.14);
        --primary: var(--gold);
        --primary-dark: #c9953d;
        --danger: #a4423d;
        --shadow-soft: 0 14px 34px rgba(26, 29, 30, 0.1);
        --focus-ring: 0 0 0 3px rgba(217, 169, 79, 0.22);
        --radius-sm: 8px;
        --radius-md: 12px;
        --radius-lg: 16px;
      }

      * {
        box-sizing: border-box;
        letter-spacing: 0 !important;
      }

      body {
        margin: 0;
        width: 360px;
        min-height: 420px;
        font: 13px/1.5 "Segoe UI Variable", "Segoe UI", Inter, Arial, sans-serif;
        color: var(--ink);
        background: var(--background);
      }

      .wrap {
        min-height: 420px;
        padding: 20px 16px 18px;
        background:
          linear-gradient(var(--graphite) 0 108px, transparent 108px),
          var(--background);
      }

      h1 {
        display: flex;
        align-items: center;
        gap: 9px;
        margin: 0 0 5px;
        color: var(--pearl);
        font-size: 19px;
        line-height: 1.2;
        letter-spacing: -0.025em !important;
      }

      h1::before {
        content: "";
        width: 28px;
        height: 28px;
        flex: 0 0 28px;
        background: url("icons/32x32.png") center / cover no-repeat;
        border: 1px solid rgba(247, 216, 131, 0.18);
        border-radius: 8px;
      }

      .subtitle {
        margin: 0 0 18px;
        color: rgba(249, 249, 249, 0.62);
        line-height: 1.4;
      }

      .panel {
        background: var(--surface-card);
        border: 1px solid var(--line);
        border-radius: var(--radius-md);
        padding: 16px;
        box-shadow: var(--shadow-soft);
      }

      .row {
        display: grid;
        gap: 8px;
        margin-bottom: 14px;
      }

      label {
        color: #5c645f;
        font-size: 11px;
        font-weight: 700;
      }

      button,
      select {
        width: 100%;
        min-height: 40px;
        border-radius: 10px;
        border: 1px solid var(--line);
        padding: 0 12px;
        font: inherit;
      }

      button {
        cursor: pointer;
        color: var(--graphite);
        background: linear-gradient(145deg, var(--light-gold), var(--primary));
        border-color: var(--primary);
        font-weight: 700;
      }

      button.secondary {
        color: var(--ink);
        background: var(--surface-card);
        border: 1px solid var(--line);
      }

      button:hover:not(:disabled) {
        color: var(--graphite);
        background: var(--light-gold);
      }

      button.secondary:hover:not(:disabled) {
        background: var(--surface-soft);
      }

      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      button:focus-visible,
      select:focus-visible {
        outline: none;
        box-shadow: var(--focus-ring);
      }

      pre {
        margin: 0;
        padding: 10px;
        max-height: 180px;
        overflow: auto;
        white-space: pre-wrap;
        word-break: break-word;
        border-radius: var(--radius-md);
        background: rgba(231, 239, 232, 0.62);
        border: 1px solid rgba(26, 29, 30, 0.1);
        color: #4e5552;
        font: 11px/1.5 "Cascadia Mono", "Consolas", monospace;
      }

      .status {
        min-height: 36px;
        margin-top: 12px;
        color: var(--muted);
      }

      .status.error {
        color: var(--danger);
      }

      select {
        color: var(--ink);
        background-color: var(--surface-card);
      }

      ::selection {
        color: var(--graphite);
        background: var(--light-gold);
      }

      @media (prefers-reduced-motion: reduce) {
        * {
          transition-duration: 0.01ms !important;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>EntryMate By Ghaniya</h1>
      <p class="subtitle">JSON OCR untuk tab Nusuk aktif.</p>

      <div class="panel">
        <div class="row">
          <button id="upload-trigger" class="secondary" type="button">Upload JSON</button>
          <input id="json-input" type="file" accept=".json,application/json" hidden>
        </div>

        <div class="row">
          <label for="member-select">Jamaah</label>
          <select id="member-select" disabled>
            <option value="">Belum ada JSON</option>
          </select>
        </div>

        <div class="row">
          <label for="preview">Pratinjau</label>
          <pre id="preview">Upload JSON untuk melihat data jamaah.</pre>
        </div>

        <div class="row">
          <button id="autofill-btn" type="button" disabled>Autofill</button>
        </div>
      </div>

      <div id="status" class="status"></div>
    </div>

    <script src="content/manifest-validator.js"></script>
    <script src="popup.js"></script>
  </body>
  </html>
