<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/src/assets/brand/entrymate-icon.png" />
    <title>EntryMate By Ghaniya</title>
    
    <style>
      html, body { margin: 0; min-height: 100%; background: #e7efe8; color: #1a1d1e; }
      
      /* Custom scrollbar for clean aesthetic */
      ::-webkit-scrollbar {
          width: 6px;
          height: 6px;
      }
      ::-webkit-scrollbar-track {
          background: transparent;
      }
      ::-webkit-scrollbar-thumb {
          background-color: rgba(26, 29, 30, 0.28);
          border-radius: 20px;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div style="display:flex; height:100vh; width:100vw; background-color:#e7efe8; align-items:center; justify-content:center; flex-direction:column; gap:16px;">
        <div style="width: 40px; height: 40px; border: 4px solid #f7d883; border-top-color: #a66c2d; border-radius: 50%; animation: spin 1s linear infinite;"></div>
        <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
        <div style="font-family:Inter, 'Segoe UI', sans-serif; font-size:14px; color:#1a1d1e; font-weight:600;">Memuat EntryMate...</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
