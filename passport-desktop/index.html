<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EntryMate By Ghaniya</title>
    
    <style>
      html, body { margin: 0; min-height: 100%; background: #f9f9fd; color: #191c1e; }
      
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .icon-fill {
        font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      
      /* Custom scrollbar for clean aesthetic */
      ::-webkit-scrollbar {
          width: 6px;
          height: 6px;
      }
      ::-webkit-scrollbar-track {
          background: transparent;
      }
      ::-webkit-scrollbar-thumb {
          background-color: #d8dadc;
          border-radius: 20px;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div style="display:flex; height:100vh; width:100vw; background-color:#f9f9fd; align-items:center; justify-content:center; flex-direction:column; gap:16px;">
        <div style="width: 40px; height: 40px; border: 4px solid #dbe1ff; border-top-color: #004ac6; border-radius: 50%; animation: spin 1s linear infinite;"></div>
        <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
        <div style="font-family:'Hanken Grotesk', sans-serif; font-size:16px; color:#434655; font-weight:600;">Memuat Aplikasi...</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
