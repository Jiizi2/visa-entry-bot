name: Release Tauri App
on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Configure MSVC for Rust
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $installPath = & $vswhere -latest -products Microsoft.VisualStudio.Product.Enterprise -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          if (-not $installPath) {
            $installPath = & $vswhere -latest -products '*' -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          }
          Write-Host "VS installation: $installPath"

          $vcVersion = (Get-Content "$installPath\VC\Auxiliary\Build\Microsoft.VCToolsVersion.default.txt").Trim()
          $vcToolsPath = "$installPath\VC\Tools\MSVC\$vcVersion"
          Write-Host "MSVC tools: $vcToolsPath"

          $sdkBase = "${env:ProgramFiles(x86)}\Windows Kits\10"
          $sdkVer = (Get-ChildItem "$sdkBase\Lib" -Directory | Where-Object { $_.Name -match '^\d+\.\d+' } | Sort-Object Name -Descending | Select-Object -First 1).Name
          Write-Host "SDK version: $sdkVer"

          echo "VCINSTALLDIR=$installPath\VC\" >> $env:GITHUB_ENV
          echo "VCToolsInstallDir=$vcToolsPath\" >> $env:GITHUB_ENV
          echo "VCToolsVersion=$vcVersion" >> $env:GITHUB_ENV
          echo "LIB=$vcToolsPath\lib\x64;$sdkBase\Lib\$sdkVer\ucrt\x64;$sdkBase\Lib\$sdkVer\um\x64" >> $env:GITHUB_ENV

      - name: setup rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: install frontend dependencies
        working-directory: ./passport-desktop
        run: npm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          # TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }} # Optional, tidak perlu jika tanpa password
        with:
          tagName: ${{ github.ref_name }} # the action automatically replaces \`v\` with nothing, or you can use \`app-v__VERSION__\`
          releaseName: 'EntryMate v__VERSION__'
          releaseBody: 'Lihat perubahan terbaru pada rilis ini.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
          projectPath: './passport-desktop'
