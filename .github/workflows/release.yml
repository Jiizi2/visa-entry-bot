name: Release Tauri App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run compilation and validation without publishing to GitHub Releases'
        required: true
        default: true
        type: boolean

concurrency:
  group: release-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  release:
    permissions:
      contents: write
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Validate Secrets (Release Path Only)
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'false')
        shell: pwsh
        run: |
          $TagName = "${{ github.ref_name }}"
          # Check if tag is pre-release (contains hyphen like rc/beta)
          $IsPreRelease = $TagName -match "-"
          
          if (-not "${{ secrets.TAURI_PRIVATE_KEY }}") {
            if ($IsPreRelease) {
              Write-Warning "TAURI_PRIVATE_KEY secret is missing! Pre-release build will proceed unsigned."
            } else {
              Write-Error "CRITICAL: TAURI_PRIVATE_KEY secret is missing! Releases cannot be signed. Failing build early."
              exit 1
            }
          }
          if (-not "${{ secrets.TAURI_PRIVATE_KEY_PASSWORD }}") {
            if ($IsPreRelease) {
              Write-Warning "TAURI_PRIVATE_KEY_PASSWORD secret is missing! Pre-release build will proceed unsigned."
            } else {
              Write-Error "CRITICAL: TAURI_PRIVATE_KEY_PASSWORD secret is missing! Decryption will fail. Failing build early."
              exit 1
            }
          }
          Write-Host "Secrets verification complete."

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: '20.13.1'
          cache: 'npm'
          cache-dependency-path: 'passport-desktop/package-lock.json'

      - name: Fix Windows MSVC and Git Linker paths
        shell: pwsh
        run: |
          $env:PATH = ($env:PATH -split ';' | Where-Object { $_ -notmatch 'Git\\usr\\bin' }) -join ';'
          echo "PATH=$env:PATH" >> $env:GITHUB_ENV
          
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $installPath = & $vswhere -latest -products Microsoft.VisualStudio.Product.Enterprise -property installationPath
          if (-not $installPath) {
            $installPath = & $vswhere -latest -products '*' -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          }
          if ($installPath) {
            $vcVer = (Get-Content "$installPath\VC\Auxiliary\Build\Microsoft.VCToolsVersion.default.txt").Trim()
            $libPath = "$installPath\VC\Tools\MSVC\$vcVer\lib\x64"
            echo "CARGO_ENCODED_RUSTFLAGS=-Lnative=$libPath" >> $env:GITHUB_ENV
          }

      - name: setup rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.95.0

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "passport-desktop/src-tauri"

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: 'python-ocr/requirements.txt'

      - name: Install Python dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r python-ocr/requirements.txt
          pip install -r python-ocr/requirements-dev.txt

      - name: Build Standalone OCR Worker (PyInstaller)
        shell: pwsh
        run: |
          cd python-ocr
          python -m PyInstaller --noconfirm --clean --onedir --name scan_worker --distpath .dist --add-data "services/data;services/data" --collect-all rapidocr_onnxruntime scan_worker.py

      - name: Stage Resources for Tauri Installer
        shell: pwsh
        run: |
          $TargetDir = "passport-desktop/src-tauri/release-resources/python-ocr-dist"
          if (Test-Path $TargetDir) {
            Remove-Item -Path $TargetDir -Recurse -Force
          }
          New-Item -ItemType Directory -Force -Path $TargetDir | Out-Null
          Copy-Item -Path "python-ocr/.dist/scan_worker/*" -Destination $TargetDir -Recurse -Force

      - name: install frontend dependencies
        working-directory: ./passport-desktop
        run: npm ci

      - name: Build the app
        working-directory: ./passport-desktop
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri build -- --config src-tauri/tauri.local-release.conf.json

      - name: Verify Release Artifact Integrity (Verification Gate)
        shell: pwsh
        run: |
          Write-Host "Starting Release Artifact Verification Gate..."
          
          # 1. Verify installer exists (use glob path resolution to avoid target folder mismatch)
          $InstallerPath = Get-ChildItem -Path "passport-desktop/src-tauri/target/**/release/bundle/nsis/*.exe" -File | Select-Object -First 1
          if (-not $InstallerPath) {
            Write-Error "Validation Failed: NSIS Setup Installer (.exe) was not compiled!"
            exit 1
          }
          Write-Host "✓ Installer found: $($InstallerPath.FullName)"
          
          # 2. Check installer size (Warning Only)
          $SizeMB = $InstallerPath.Length / 1MB
          Write-Host "Installer Size: $SizeMB MB"
          if ($SizeMB -lt 80) {
            Write-Warning "Installer size is smaller than expected ($SizeMB MB). Confirm if resources are fully bundled."
          } else {
            Write-Host "✓ Installer size appears valid."
          }
          
          # 3. Verify scan_worker.exe exists in release resources
          $WorkerExe = "passport-desktop/src-tauri/release-resources/python-ocr-dist/scan_worker.exe"
          if (-not (Test-Path $WorkerExe)) {
            Write-Error "Validation Failed: scan_worker.exe does not exist in release-resources!"
            exit 1
          }
          Write-Host "✓ scan_worker.exe found in release-resources."
          
          # 4. Verify rapidocr_onnxruntime models and libraries exist inside the internal folders
          $ModelDir = "passport-desktop/src-tauri/release-resources/python-ocr-dist/_internal/rapidocr_onnxruntime"
          if (-not (Test-Path $ModelDir)) {
            Write-Error "Validation Failed: rapidocr_onnxruntime models are missing inside scan_worker._internal!"
            exit 1
          }
          Write-Host "✓ rapidocr_onnxruntime model folder verified inside scan_worker._internal."

          # 5. Verify config file exists
          $ConfigPath = "passport-desktop/src-tauri/tauri.local-release.conf.json"
          if (-not (Test-Path $ConfigPath)) {
            Write-Error "Validation Failed: local-release config file not found!"
            exit 1
          }
          Write-Host "✓ tauri.local-release.conf.json found."

          # 6. Verify updater.json and signature exists (if private key is present)
          $UpdaterJson = Get-ChildItem -Path "passport-desktop/src-tauri/target/**/release/bundle/updater/*.json" -File | Select-Object -First 1
          if (-not $UpdaterJson) {
            Write-Warning "Warning: updater.json not found in bundler output."
          } else {
            Write-Host "✓ updater.json found: $($UpdaterJson.FullName)"
          }
          
          # Only assert signatures on actual release runs (where signing keys are present)
          if ("${{ secrets.TAURI_PRIVATE_KEY }}") {
            $SigFile = Get-ChildItem -Path "passport-desktop/src-tauri/target/**/release/bundle/nsis/*.sig" -File | Select-Object -First 1
            if (-not $SigFile) {
              Write-Error "Validation Failed: Updater signature file (.sig) is missing! Auto-updates will fail."
              exit 1
            }
            Write-Host "✓ Signature file found: $($SigFile.FullName)"
          } else {
            Write-Host "! Skipping signature file check (build is unsigned)."
          }
          
          Write-Host "All Release Artifact checks PASSED!"

      - name: Upload updater json
        uses: actions/upload-artifact@v4
        with:
          name: updater-json-windows
          path: passport-desktop/src-tauri/target/**/release/bundle/updater/*.json
          if-no-files-found: warn

      - name: Upload Release Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-windows
          path: |
            passport-desktop/src-tauri/target/**/release/bundle/nsis/*.exe
            passport-desktop/src-tauri/target/**/release/bundle/nsis/*.sig
          if-no-files-found: warn

  publish-release:
    needs: release
    # Skip publishing releases if it's a dry_run
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'false')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts
          pattern: "{release-assets-*,updater-json-*}"
          merge-multiple: true

      - name: Build updater.json from signatures
        env:
          VERSION: ${{ github.ref_name || 'v1.0.19' }}
          REPO: ${{ github.repository }}
        run: |
          DOWNLOAD_BASE="https://github.com/${REPO}/releases/download/${VERSION}"
          VER="${VERSION#v}"

          read_sig() {
            local pattern="$1"
            local sig_file
            sig_file=$(find all-artifacts -name "$pattern" -type f 2>/dev/null | head -1)
            if [ -n "$sig_file" ] && [ -f "$sig_file" ]; then
              cat "$sig_file"
            else
              echo ""
            fi
          }

          get_filename() {
            local pattern="$1"
            local file
            file=$(find all-artifacts -name "$pattern" -type f 2>/dev/null | head -1)
            if [ -n "$file" ]; then
              basename "$file"
            else
              echo ""
            fi
          }

          WINDOWS_NSIS_SIG=$(read_sig "*.exe.sig")
          WIN_NSIS_FILE=$(get_filename "*.exe")
          
          # Deterministic timestamp based on the git commit timestamp instead of current runner execution time
          COMMIT_DATE=$(git log -1 --format=%cI)

          jq -n \
            --arg version "$VER" \
            --arg notes "Lihat perubahan terbaru pada rilis ini." \
            --arg pub_date "$COMMIT_DATE" \
            --arg dl "$DOWNLOAD_BASE" \
            --arg win_nsis_sig "$WINDOWS_NSIS_SIG" \
            --arg win_nsis_file "$WIN_NSIS_FILE" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $pub_date,
              platforms: {
                "windows-x86_64": (if $win_nsis_sig != "" then {
                  url: "\($dl)/\($win_nsis_file)",
                  signature: $win_nsis_sig
                } else null end)
              } | with_entries(select(.value != null))
            }' > updater.json

          echo "Generated updater.json:"
          cat updater.json

      - name: Create or Update GitHub Release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          name: "EntryMate ${{ github.ref_name }}"
          body: "Lihat perubahan terbaru pada rilis ini."
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: "all-artifacts/**/*,updater.json"
          artifactErrorsFailBuild: true
          replacesArtifacts: true
