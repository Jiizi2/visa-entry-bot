name: Release Tauri App
on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-2022'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: setup MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Fix MSVC library paths for Rust
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # On GitHub runners, both Enterprise and BuildTools editions of VS are
          # installed. Rust's internal find-msvc-tools crate discovers BuildTools
          # via COM and uses its (incomplete) lib path, while ilammy/msvc-dev-cmd
          # puts Enterprise's link.exe on PATH. This mismatch causes LNK1104.
          #
          # Fix: add Enterprise's lib path via RUSTFLAGS so the linker can find
          # msvcrt.lib regardless of which LIBPATH find-msvc-tools injects.

          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $installPath = & $vswhere -latest -products Microsoft.VisualStudio.Product.Enterprise -property installationPath
          if (-not $installPath) {
            $installPath = & $vswhere -latest -products '*' -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          }

          $vcVer = (Get-Content "$installPath\VC\Auxiliary\Build\Microsoft.VCToolsVersion.default.txt").Trim()
          $libPath = "$installPath\VC\Tools\MSVC\$vcVer\lib\x64"

          Write-Host "VS path:     $installPath"
          Write-Host "MSVC ver:    $vcVer"
          Write-Host "Lib path:    $libPath"
          Write-Host "msvcrt.lib:  $(Test-Path "$libPath\msvcrt.lib")"

          echo "CARGO_ENCODED_RUSTFLAGS=-Lnative=$libPath" >> $env:GITHUB_ENV

      - name: setup rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: install frontend dependencies
        working-directory: ./passport-desktop
        run: npm install

      - name: Build the app
        working-directory: ./passport-desktop
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri build -- ${{ matrix.args }}

      - name: Rename macOS assets for architecture
        if: matrix.platform == 'macos-latest'
        shell: bash
        working-directory: ./passport-desktop
        run: |
          if [[ "${{ matrix.args }}" == *"--target aarch64-apple-darwin"* ]]; then
            ARCH="aarch64"
          elif [[ "${{ matrix.args }}" == *"--target x86_64-apple-darwin"* ]]; then
            ARCH="x64"
          else
            ARCH="unknown"
          fi
          
          echo "Detected architecture: $ARCH"
          
          cd src-tauri/target/*/release/bundle/macos/ 2>/dev/null || exit 0
          
          for APP_TAR in *.app.tar.gz; do
            if [ -f "$APP_TAR" ]; then
              BASENAME="${APP_TAR%.app.tar.gz}"
              mv "$APP_TAR" "${BASENAME}_${ARCH}.app.tar.gz"
              if [ -f "$APP_TAR.sig" ]; then
                mv "$APP_TAR.sig" "${BASENAME}_${ARCH}.app.tar.gz.sig"
              fi
              echo "Renamed assets to append Arch: $ARCH"
            fi
          done

      - name: Upload updater json
        uses: actions/upload-artifact@v4
        with:
          name: updater-json-${{ matrix.platform }}-${{ strategy.job-index }}
          path: passport-desktop/src-tauri/target/**/release/bundle/updater/*.json
          if-no-files-found: warn

      - name: Upload Release Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-${{ matrix.platform }}-${{ strategy.job-index }}
          path: |
            passport-desktop/src-tauri/target/**/release/bundle/dmg/*.dmg
            passport-desktop/src-tauri/target/**/release/bundle/deb/*.deb
            passport-desktop/src-tauri/target/**/release/bundle/appimage/*.AppImage
            passport-desktop/src-tauri/target/**/release/bundle/msi/*.msi
            passport-desktop/src-tauri/target/**/release/bundle/nsis/*.exe
            passport-desktop/src-tauri/target/**/release/bundle/rpm/*.rpm
            passport-desktop/src-tauri/target/**/release/bundle/macos/*.app.tar.gz
            passport-desktop/src-tauri/target/**/release/bundle/macos/*.app.tar.gz.sig
            passport-desktop/src-tauri/target/**/release/bundle/dmg/*.sig
            passport-desktop/src-tauri/target/**/release/bundle/deb/*.sig
            passport-desktop/src-tauri/target/**/release/bundle/appimage/*.sig
            passport-desktop/src-tauri/target/**/release/bundle/msi/*.sig
            passport-desktop/src-tauri/target/**/release/bundle/nsis/*.sig
            passport-desktop/src-tauri/target/**/release/bundle/rpm/*.sig
          if-no-files-found: warn

  publish-release:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts
          pattern: "{release-assets-*,updater-json-*}"
          merge-multiple: true

      - name: Build updater.json from signatures
        env:
          VERSION: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          DOWNLOAD_BASE="https://github.com/${REPO}/releases/download/${VERSION}"
          VER="${VERSION#v}"

          read_sig() {
            local pattern="$1"
            local sig_file
            sig_file=$(find all-artifacts -name "$pattern" -type f 2>/dev/null | head -1)
            if [ -n "$sig_file" ] && [ -f "$sig_file" ]; then
              cat "$sig_file"
            else
              echo ""
            fi
          }

          get_filename() {
            local pattern="$1"
            local file
            file=$(find all-artifacts -name "$pattern" -type f 2>/dev/null | head -1)
            if [ -n "$file" ]; then
              basename "$file"
            else
              echo ""
            fi
          }

          MACOS_AARCH64_SIG=$(read_sig "*_aarch64.app.tar.gz.sig")
          MACOS_X64_SIG=$(read_sig "*_x64.app.tar.gz.sig")
          WINDOWS_NSIS_SIG=$(read_sig "*.exe.sig")
          LINUX_AMD64_SIG=$(read_sig "*.AppImage.sig")

          MAC_AARCH64_FILE=$(get_filename "*_aarch64.app.tar.gz")
          MAC_X64_FILE=$(get_filename "*_x64.app.tar.gz")
          WIN_NSIS_FILE=$(get_filename "*.exe")
          LINUX_AMD64_FILE=$(get_filename "*.AppImage")

          jq -n \
            --arg version "$VER" \
            --arg notes "Lihat perubahan terbaru pada rilis ini." \
            --arg pub_date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg dl "$DOWNLOAD_BASE" \
            --arg mac_a64_sig "$MACOS_AARCH64_SIG" \
            --arg mac_x64_sig "$MACOS_X64_SIG" \
            --arg win_nsis_sig "$WINDOWS_NSIS_SIG" \
            --arg linux_amd64_sig "$LINUX_AMD64_SIG" \
            --arg mac_a64_file "$MAC_AARCH64_FILE" \
            --arg mac_x64_file "$MAC_X64_FILE" \
            --arg win_nsis_file "$WIN_NSIS_FILE" \
            --arg linux_amd64_file "$LINUX_AMD64_FILE" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $pub_date,
              platforms: {
                "darwin-aarch64": (if $mac_a64_sig != "" then {
                  url: "\($dl)/\($mac_a64_file)",
                  signature: $mac_a64_sig
                } else null end),
                "darwin-x86_64": (if $mac_x64_sig != "" then {
                  url: "\($dl)/\($mac_x64_file)",
                  signature: $mac_x64_sig
                } else null end),
                "windows-x86_64": (if $win_nsis_sig != "" then {
                  url: "\($dl)/\($win_nsis_file)",
                  signature: $win_nsis_sig
                } else null end),
                "linux-x86_64": (if $linux_amd64_sig != "" then {
                  url: "\($dl)/\($linux_amd64_file)",
                  signature: $linux_amd64_sig
                } else null end)
              } | with_entries(select(.value != null))
            }' > updater.json

          echo "Generated updater.json:"
          cat updater.json

      - name: Create or Update GitHub Release
        uses: ncipollo/release-action@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          allowUpdates: true
          name: "EntryMate ${{ github.ref_name }}"
          body: "Lihat perubahan terbaru pada rilis ini."
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: "all-artifacts/**/*,updater.json"
          artifactErrorsFailBuild: false
          replacesArtifacts: true
